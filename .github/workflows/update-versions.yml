name: 更新軟體版本

# 每天 02:00 (UTC) 跑一次,也可手動觸發
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 抓取最新版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-versions.mjs
      - name: 若有變更則提交
        run: |
          if [[ -n "$(git status --porcelain public/data/software.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data/software.json
            git commit -m "chore(downloads): 自動更新軟體版本號"
            git push
          else
            echo "無變更"
          fi
